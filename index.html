<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP4 to GIF Converter</title>

  <!-- FIXED: Use UMD build that exposes global FFmpeg -->
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

  <style>
    body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f5f5f5; }
    .container { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:360px; text-align:center; }
    button { margin-top:10px; padding:10px; border:none; border-radius:8px; background:black; color:white; width:100%; cursor:pointer; }
    input, label { margin-top:10px; width:100%; }
    video, img { margin-top:10px; width:100%; border-radius:8px; }
    .progress-bar { width:100%; height:10px; background:#ddd; border-radius:6px; overflow:hidden; margin-top:10px; }
    .progress { height:100%; width:0%; background:black; }
  </style>
</head>
<body>
<div class="container">
  <h2>MP4 to GIF Converter</h2>

  <input type="file" id="upload" accept="video/mp4" />

  <video id="preview" controls></video>

  <label>Start Time (sec)</label>
  <input type="range" id="start" min="0" value="0" step="0.1" />

  <label>Duration (sec)</label>
  <input type="number" id="duration" value="5" min="1" />

  <label>FPS</label>
  <input type="range" id="fps" min="5" max="20" value="10" />

  <label>Resolution (width)</label>
  <input type="range" id="resolution" min="160" max="640" step="40" value="320" />

  <p id="estimate">Estimated size: -</p>

  <button id="convertBtn">Convert</button>
  <button id="downloadBtn" style="display:none;">Download GIF</button>

  <div class="progress-bar"><div class="progress" id="progress"></div></div>

  <p id="status"></p>
  <img id="output" />
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {

  const { createFFmpeg, fetchFile } = FFmpeg;
  const ffmpeg = createFFmpeg({ log: true });

  const upload = document.getElementById('upload');
  const preview = document.getElementById('preview');
  const start = document.getElementById('start');
  const duration = document.getElementById('duration');
  const fps = document.getElementById('fps');
  const res = document.getElementById('resolution');
  const status = document.getElementById('status');
  const progress = document.getElementById('progress');
  const estimate = document.getElementById('estimate');
  const downloadBtn = document.getElementById('downloadBtn');
  const convertBtn = document.getElementById('convertBtn');

  let file = null;
  let gifURL = null;

  function updateEstimate() {
    const frames = duration.value * fps.value;
    const pixels = res.value * res.value;
    const bytes = frames * pixels * 0.00007;
    const mb = bytes / (1024 * 1024);
    estimate.textContent = `Estimated size: ${mb.toFixed(2)} MB`;
  }

  upload.addEventListener('change', (e) => {
    file = e.target.files[0];
    if (!file) return;

    preview.src = URL.createObjectURL(file);

    preview.onloadedmetadata = () => {
      start.max = preview.duration;
    };
  });

  start.addEventListener('input', () => {
    preview.currentTime = start.value;
  });

  [duration, fps, res].forEach(el => el.addEventListener('input', updateEstimate));

  ffmpeg.setProgress(({ ratio }) => {
    progress.style.width = `${Math.floor(ratio * 100)}%`;
  });

  convertBtn.addEventListener('click', async () => {
    try {
      if (!file) {
        alert('Upload a video first');
        return;
      }

      status.textContent = 'Loading FFmpeg...';

      if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
      }

      ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

      status.textContent = 'Converting...';
      progress.style.width = '0%';

      await ffmpeg.run(
        '-ss', String(start.value),
        '-t', String(duration.value),
        '-i', 'input.mp4',
        '-vf', `fps=${fps.value},scale=${res.value}:-1:flags=lanczos`,
        'out.gif'
      );

      const data = ffmpeg.FS('readFile', 'out.gif');
      gifURL = URL.createObjectURL(new Blob([data.buffer], { type: 'image/gif' }));

      document.getElementById('output').src = gifURL;
      downloadBtn.style.display = 'block';

      status.textContent = 'Done';
    } catch (err) {
      console.error(err);
      status.textContent = 'Error: ' + err.message;
    }
  });

  downloadBtn.addEventListener('click', () => {
    if (!gifURL) return;
    const a = document.createElement('a');
    a.href = gifURL;
    a.download = 'converted.gif';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  updateEstimate();

});
</script>
</body>
</html>
