<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP4 to GIF Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>
  <style>
    body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f5f5f5; }
    .container { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:340px; text-align:center; }
    button { margin-top:10px; padding:10px; border:none; border-radius:8px; background:black; color:white; width:100%; cursor:pointer; }
    input, label { margin-top:10px; width:100%; }
    video, img { margin-top:10px; width:100%; border-radius:8px; }
    .progress-bar { width:100%; height:10px; background:#ddd; border-radius:6px; overflow:hidden; margin-top:10px; }
    .progress { height:100%; width:0%; background:black; }
  </style>
</head>
<body>
<div class="container">
  <h2>MP4 to GIF Converter</h2>

  <input type="file" id="upload" accept="video/mp4" />

  <video id="preview" controls></video>

  <label>Start Time</label>
  <input type="range" id="start" min="0" value="0" step="0.1" />

  <label>Duration (sec)</label>
  <input type="number" id="duration" value="5" min="1" />

  <label>FPS</label>
  <input type="range" id="fps" min="5" max="20" value="10" />

  <label>Resolution</label>
  <input type="range" id="resolution" min="160" max="640" step="40" value="320" />

  <p id="estimate">Estimated size: -</p>

  <button onclick="convert()">Convert</button>
  <button id="downloadBtn" style="display:none;" onclick="downloadGIF()">Download</button>

  <div class="progress-bar"><div class="progress" id="progress"></div></div>

  <p id="status"></p>
  <img id="output" />
</div>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log:true });
let gifURL=null;
let videoFile=null;

const preview = document.getElementById('preview');
const startSlider = document.getElementById('start');
const durationInput = document.getElementById('duration');
const fpsInput = document.getElementById('fps');
const resInput = document.getElementById('resolution');

// Load video preview
document.getElementById('upload').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  videoFile = file;
  preview.src = URL.createObjectURL(file);
  preview.onloadedmetadata = ()=>{
    startSlider.max = preview.duration;
  };
  updateEstimate();
});

// Scrubber
startSlider.addEventListener('input', ()=>{
  preview.currentTime = startSlider.value;
  updateEstimate();
});

// Estimate size (rough heuristic)
function updateEstimate(){
  const duration = durationInput.value;
  const fps = fpsInput.value;
  const res = resInput.value;

  // rough formula: frames * pixels * compression factor
  const frames = duration * fps;
  const pixels = res * res * 0.6; // approximate aspect ratio
  const bytes = frames * pixels * 0.07;

  const kb = bytes / 1024;
  const mb = kb / 1024;

  document.getElementById('estimate').textContent =
    mb > 1 ? `Estimated size: ${mb.toFixed(2)} MB` : `Estimated size: ${kb.toFixed(0)} KB`;
}

[fpsInput, resInput, durationInput].forEach(el=>{
  el.addEventListener('input', updateEstimate);
});

// Progress
ffmpeg.setProgress(({ratio})=>{
  document.getElementById('progress').style.width = (ratio*100)+'%';
});

async function convert(){
  const status = document.getElementById('status');
  const start = startSlider.value;
  const duration = durationInput.value;
  const fps = fpsInput.value;
  const res = resInput.value;

  if(!videoFile){ alert('Upload a file'); return; }

  if(!ffmpeg.isLoaded()){
    status.textContent='Loading...';
    await ffmpeg.load();
  }

  ffmpeg.FS('writeFile','input.mp4', await fetchFile(videoFile));

  status.textContent='Converting...';
  document.getElementById('progress').style.width='0%';

  await ffmpeg.run(
    '-ss', String(start),
    '-t', String(duration),
    '-i','input.mp4',
    '-vf', `fps=${fps},scale=${res}:-1:flags=lanczos`,
    'out.gif'
  );

  const data = ffmpeg.FS('readFile','out.gif');
  gifURL = URL.createObjectURL(new Blob([data.buffer],{type:'image/gif'}));

  document.getElementById('output').src = gifURL;
  document.getElementById('downloadBtn').style.display='block';
  status.textContent='Done';
}

function downloadGIF(){
  const a=document.createElement('a');
  a.href=gifURL;
  a.download='converted.gif';
  a.click();
}
</script>
</body>
</html>
